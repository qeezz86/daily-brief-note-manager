name: Bundle budget

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run bundle:check
      - name: Upload bundle budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-budget-report
          path: artifacts/bundle-budget-report.json
          if-no-files-found: warn
          retention-days: 7
