name: Bundle budget

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-public-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Check bundle budget
        run: npm run bundle:check
      - name: Upload bundle budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-budget-report
          path: artifacts/bundle-budget-report.json
          if-no-files-found: warn
          retention-days: 7
